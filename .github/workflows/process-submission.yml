name: Process submission

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  process:
    if: contains(toJSON(github.event.issue.labels), 'submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.COWORK_PAT }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ImageMagick (for photo resize)
        run: sudo apt-get update && sudo apt-get install -y imagemagick
      - name: Install Anthropic SDK
        run: npm install --no-save @anthropic-ai/sdk@latest
      - name: Process submission
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.COWORK_PAT }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels) }}
        run: node .github/scripts/process-submission.mjs
